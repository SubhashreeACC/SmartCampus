<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartCampus — Faculty List</title>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <style>
        .page-card { background: var(--card-bg); border-radius: var(--radius); padding: 28px; box-shadow: var(--shadow); }
        .page-title-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
        .page-title-row h2 { font-size: 22px; font-weight: 700; color: var(--text-dark); }
        .search-input { border: 1px solid var(--border); border-radius: 50px; padding: 9px 18px; font-size: 13px; outline: none; width: 240px; background: var(--bg); }
        .search-input:focus { border-color: var(--primary); }
        .faculty-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; margin-top: 8px; }
        .faculty-card { background: var(--bg); border-radius: var(--radius-sm); padding: 20px; border: 1px solid var(--border); transition: all .25s; display: flex; flex-direction: column; gap: 12px; }
        .faculty-card:hover { border-color: var(--primary); box-shadow: var(--shadow-hover); transform: translateY(-2px); }
        .faculty-top { display: flex; align-items: center; gap: 14px; }
        .faculty-avatar { width: 50px; height: 50px; border-radius: 14px; background: var(--primary); color: #1a2e24; font-size: 18px; font-weight: 800; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .faculty-name { font-size: 15px; font-weight: 700; color: var(--text-dark); }
        .faculty-desig { font-size: 11px; color: var(--text-light); margin-top: 2px; }
        .faculty-info-row { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--text-mid); }
        .faculty-info-row i { color: var(--primary); width: 14px; }
        .dept-badge { display: inline-block; background: var(--primary-pale); color: var(--primary); font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 20px; }
        .btn-edit { background: #dbeeff; color: var(--accent-blue); border: none; padding: 6px 16px; border-radius: 8px; font-size: 12px; font-weight: 600; cursor: pointer; transition: .2s; }
        .btn-edit:hover { background: var(--accent-blue); color: #fff; }
        .card-footer-row { display: flex; justify-content: space-between; align-items: center; border-top: 1px solid var(--border); padding-top: 12px; margin-top: 4px; }
        .gender-badge { font-size: 11px; color: var(--text-light); font-weight: 600; }
        .modal-content { border-radius: var(--radius); border: 1px solid var(--border); }
        .modal-header { background: var(--primary-pale); border-bottom: 1px solid var(--border); border-radius: var(--radius) var(--radius) 0 0; }
        .modal-title { font-weight: 700; color: var(--text-dark); }
        .form-label { font-size: 12px; font-weight: 600; color: var(--text-mid); }
        .form-control { border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 10px 14px; font-size: 13px; }
        .form-control:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(200,241,53,.2); }
        .btn-lime { background: var(--primary); color: #1a2e24; font-weight: 700; border: none; padding: 10px 22px; border-radius: var(--radius-sm); cursor: pointer; transition: .2s; }
        .btn-lime:hover { background: var(--primary-light); }
        .empty-state { text-align: center; padding: 60px 20px; color: var(--text-light); }
        .empty-state i { font-size: 48px; color: var(--border); margin-bottom: 16px; }
    </style>
</head>
<body>
<div th:replace="fragments/sidebar :: sidebar"></div>
<main class="main">
    <div th:replace="fragments/topbar :: topbar"></div>

    <div class="page-card">
        <div class="page-title-row">
            <h2><i class="fas fa-chalkboard-teacher" style="color:var(--primary);margin-right:10px"></i>Faculty Directory</h2>
            <div style="display:flex;gap:12px;align-items:center">
                <input type="text" id="searchInput" class="search-input" placeholder="&#xf002; Search faculty...">
                <a href="/admin/registerFaculty" class="btn btn-sm" style="background:var(--primary);color:#1a2e24;font-weight:700;padding:9px 20px;border-radius:var(--radius-sm);">
                    <i class="fas fa-plus"></i> Add Faculty
                </a>
            </div>
        </div>

        <!-- Faculty Cards Grid -->
        <div class="faculty-grid" id="facultyGrid">
            <div th:each="f, stat : ${facultyList}" class="faculty-card" th:attr="data-name=${f.fullName},data-dept=${f.deptName}">
                <div class="faculty-top">
                    <div class="faculty-avatar" th:text="${#strings.substring(f.fullName, 0, 2).toUpperCase()}">DR</div>
                    <div>
                        <div class="faculty-name" th:text="${f.fullName}">Dr. John Doe</div>
                        <div class="faculty-desig" th:text="${f.designation}">Professor</div>
                    </div>
                </div>
                <div class="faculty-info-row"><i class="fas fa-envelope"></i> <span th:text="${f.email}">email@test.com</span></div>
                <div class="faculty-info-row"><i class="fas fa-phone"></i> <span th:text="${f.phone}">9876543210</span></div>
                <div class="faculty-info-row"><i class="fas fa-map-marker-alt"></i> <span th:text="${f.address}">Address</span></div>
                <div class="card-footer-row">
                    <span class="dept-badge" th:text="${f.deptName}">Dept</span>
                    <div style="display:flex;gap:8px;align-items:center">
                        <span class="gender-badge" th:text="${f.gender}">Male</span>
                        <button class="btn-edit"
                            th:attr="data-id=${f.id},data-name=${f.fullName},data-designation=${f.designation},data-email=${f.email},data-phone=${f.phone},data-gender=${f.gender},data-dept=${f.deptName},data-address=${f.address}"
                            onclick="openEditModal(this)">
                            <i class="fas fa-pen"></i> Edit
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Empty state -->
        <div class="empty-state" th:if="${#lists.isEmpty(facultyList)}">
            <i class="fas fa-users-slash"></i>
            <p>No faculty members found. <a href="/admin/registerFaculty" style="color:var(--primary);font-weight:700">Register one now</a>.</p>
        </div>
    </div>

    <!-- Edit Modal -->
    <div class="modal fade" id="editFacultyModal">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title"><i class="fas fa-pen me-2"></i>Edit Faculty</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <form th:action="@{/faculty/update}" method="post">
                    <div class="modal-body p-4">
                        <input type="hidden" id="editId" name="Id">
                        <div class="row g-3">
                            <div class="col-6">
                                <label class="form-label">Full Name</label>
                                <input type="text" id="editName" name="fullName" class="form-control" placeholder="Full Name">
                            </div>
                            <div class="col-6">
                                <label class="form-label">Designation</label>
                                <input type="text" id="editDesignation" name="designation" class="form-control" placeholder="Designation">
                            </div>
                            <div class="col-6">
                                <label class="form-label">Email</label>
                                <input type="email" id="editEmail" name="email" class="form-control" placeholder="Email">
                            </div>
                            <div class="col-6">
                                <label class="form-label">Phone</label>
                                <input type="text" id="editPhone" name="phone" class="form-control" placeholder="Phone">
                            </div>
                            <div class="col-6">
                                <label class="form-label">Gender</label>
                                <select id="editGender" name="gender" class="form-control">
                                    <option value="Male">Male</option>
                                    <option value="Female">Female</option>
                                    <option value="Other">Other</option>
                                </select>
                            </div>
                            <div class="col-6">
                                <label class="form-label">Department</label>
                                <input type="text" id="editDept" name="departmentName" class="form-control" placeholder="Department">
                            </div>
                            <div class="col-12">
                                <label class="form-label">Address</label>
                                <textarea id="editAddress" name="address" class="form-control" rows="2" placeholder="Address"></textarea>
                            </div>
                        </div>
                    </div>
                    <div class="modal-footer border-0">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn-lime">Update Faculty</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</main>
<script>
    function openEditModal(button) {
        document.getElementById("editId").value = button.getAttribute("data-id");
        document.getElementById("editName").value = button.getAttribute("data-name");
        document.getElementById("editDesignation").value = button.getAttribute("data-designation");
        document.getElementById("editEmail").value = button.getAttribute("data-email");
        document.getElementById("editPhone").value = button.getAttribute("data-phone");
        document.getElementById("editGender").value = button.getAttribute("data-gender");
        document.getElementById("editDept").value = button.getAttribute("data-dept");
        document.getElementById("editAddress").value = button.getAttribute("data-address");
        new bootstrap.Modal(document.getElementById('editFacultyModal')).show();
    }
    // Live search
    $('#searchInput').on('input', function () {
        const q = $(this).val().toLowerCase();
        $('.faculty-card').each(function () {
            const name = ($(this).data('name') || '').toLowerCase();
            const dept = ($(this).data('dept') || '').toLowerCase();
            $(this).toggle(name.includes(q) || dept.includes(q));
        });
    });
</script>
</body>
</html>
