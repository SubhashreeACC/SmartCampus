<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>SmartCampus — My Results</title>
	<!-- Font Awesome -->
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
	<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
	<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
	<link rel="stylesheet" href="/css/style.css">

	<style>
		:root {
			--bg: #faf7f2;
			--surface: #ffffff;
			--text-primary: #1e1e1e;
			--text-secondary: #5a5a5a;
			--lime: #c8f135;
			--lime-dim: rgba(200, 241, 53, 0.1);
			--border: rgba(0, 0, 0, 0.06);
			--shadow: 0 12px 28px -8px rgba(0, 0, 0, 0.06);
		}

		body {
			background-color: var(--bg);
			font-family: 'Sora', sans-serif;
			color: var(--text-primary);
		}

		.main { padding: 2rem; }

		.glass-card {
			background: var(--surface);
			border-radius: 24px;
			border: 1px solid var(--border);
			padding: 32px;
			box-shadow: var(--shadow);
			animation: fadeInUp 0.5s ease both;
		}

		.transcript-header {
			display: flex;
			justify-content: space-between;
			align-items: center;
			margin-bottom: 32px;
			padding-bottom: 24px;
			border-bottom: 2px solid var(--lime-dim);
		}

		.student-badge {
			background: #1a1d2e;
			color: #fff;
			padding: 6px 16px;
			border-radius: 30px;
			font-size: 11px;
			font-weight: 700;
			text-transform: uppercase;
		}

		.grade-pill {
			width: 44px;
			height: 44px;
			background: var(--lime);
			color: #1a1d2e;
			border-radius: 12px;
			display: flex;
			align-items: center;
			justify-content: center;
			font-weight: 800;
			font-size: 16px;
			box-shadow: 0 4px 12px rgba(200, 241, 53, 0.3);
		}

		.sem-badge {
			font-size: 10px;
			font-weight: 700;
			color: var(--text-secondary);
			background: #f0ede7;
			padding: 4px 10px;
			border-radius: 6px;
			text-transform: uppercase;
		}

		.table-custom { width: 100%; border-collapse: collapse; }
		.table-custom th { padding: 16px; font-size: 11px; font-weight: 700; color: var(--text-secondary); text-transform: uppercase; text-align: left; border-bottom: 1px solid var(--border); }
		.table-custom td { padding: 20px 16px; font-size: 14px; border-bottom: 1px solid var(--border); }

		@keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
	</style>
</head>

<body>

	<div th:replace="fragments/sidebar :: sidebar"></div>

	<main class="main">
		<div th:replace="fragments/topbar :: topbar"></div>

		<div class="content">
			<div class="glass-card">
				<div class="transcript-header">
					<div>
						<span class="student-badge">Official Transcript</span>
						<h2 style="margin: 12px 0 4px; font-weight: 800;" th:text="${currentUser.name}">Student Name</h2>
						<p style="margin: 0; color: var(--text-secondary); font-size: 14px;" th:text="${'Academic Year: 2025-26'}">Year</p>
					</div>
					<div style="text-align: right;">
						<button class="btn-outline-custom" onclick="window.print()"><i class="fas fa-download"></i> Download PDF</button>
					</div>
				</div>

				<div class="table-responsive">
					<table class="table-custom">
						<thead>
							<tr>
								<th>Subject / Course</th>
								<th>Semester</th>
								<th>Status</th>
								<th>Academic Grade</th>
							</tr>
						</thead>
						<tbody>
							<tr th:each="r : ${results}">
								<td>
									<div style="font-weight: 700; font-size: 15px;" th:text="${r.subjectName}">Subject Name</div>
									<div style="font-size: 11px; color: var(--text-secondary);" th:text="${r.subjectCode}">CS101</div>
								</td>
								<td>
									<span class="sem-badge" th:text="${'Sem ' + r.semester}">Sem 1</span>
								</td>
								<td>
									<span style="color: #2d7a4f; font-weight: 700; font-size: 12px;">
										<i class="fas fa-check-circle"></i> COMPLETED
									</span>
								</td>
								<td>
									<div class="grade-pill" th:text="${r.grade}">A+</div>
								</td>
							</tr>
							<tr th:if="${#lists.isEmpty(results)}">
								<td colspan="4" class="text-center py-5">
									<div style="font-size: 48px; margin-bottom: 16px;">🎓</div>
									<h4 style="font-weight: 700;">No Grades Available</h4>
									<p style="color: var(--text-secondary);">Your results haven't been uploaded by the faculty yet.</p>
								</td>
							</tr>
						</tbody>
					</table>
				</div>

				<div class="mt-5 p-4" style="background: var(--bg); border-radius: 16px;">
					<div class="row">
						<div class="col-md-4 text-center">
							<div style="font-size: 11px; font-weight: 700; color: var(--text-secondary); text-transform: uppercase;">Total Credits</div>
							<div style="font-size: 24px; font-weight: 800;">--</div>
						</div>
						<div class="col-md-4 text-center" style="border-left: 1px solid var(--border); border-right: 1px solid var(--border);">
							<div style="font-size: 11px; font-weight: 700; color: var(--text-secondary); text-transform: uppercase;">SGPA / CGPA</div>
							<div style="font-size: 24px; font-weight: 800; color: var(--text-primary);">--</div>
						</div>
						<div class="col-md-4 text-center">
							<div style="font-size: 11px; font-weight: 700; color: var(--text-secondary); text-transform: uppercase;">Academic Status</div>
							<div style="font-size: 24px; font-weight: 800; color: #2d7a4f;">EXCELLENT</div>
						</div>
					</div>
				</div>
			</div>
		</div>
	</main>

</body>
</html>
