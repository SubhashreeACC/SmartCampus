<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>SmartCampus — My Attendance</title>
	<!-- Font Awesome -->
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
	<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
	<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
	<link rel="stylesheet" href="/css/style.css">

	<style>
		:root {
			--bg: #faf7f2;
			--surface: #ffffff;
			--text-primary: #1e1e1e;
			--text-secondary: #5a5a5a;
			--lime: #c8f135;
			--lime-dim: rgba(200, 241, 53, 0.1);
			--border: rgba(0, 0, 0, 0.06);
			--shadow: 0 12px 28px -8px rgba(0, 0, 0, 0.06);
		}

		body {
			background-color: var(--bg);
			font-family: 'Sora', sans-serif;
			color: var(--text-primary);
		}

		.main { padding: 2rem; }

		.glass-card {
			background: var(--surface);
			border-radius: 24px;
			border: 1px solid var(--border);
			padding: 32px;
			box-shadow: var(--shadow);
			animation: fadeInUp 0.5s ease both;
		}

		.page-header {
			display: flex;
			justify-content: space-between;
			align-items: center;
			margin-bottom: 32px;
		}

		.header-title h2 {
			font-size: 32px;
			font-weight: 800;
			letter-spacing: -0.02em;
			margin: 0;
		}

		/* Stats Grid */
		.stats-grid {
			display: grid;
			grid-template-columns: repeat(3, 1fr);
			gap: 20px;
			margin-bottom: 32px;
		}

		.stat-pill {
			background: #fff;
			padding: 24px;
			border-radius: 20px;
			border: 1px solid var(--border);
			text-align: center;
		}

		.stat-label {
			font-size: 11px;
			font-weight: 700;
			color: var(--text-secondary);
			text-transform: uppercase;
			margin-bottom: 8px;
		}

		.stat-value {
			font-size: 28px;
			font-weight: 800;
			color: var(--text-primary);
		}

		/* Table */
		.table-wrap {
			border: 1px solid var(--border);
			border-radius: 20px;
			overflow: hidden;
			background: #fff;
		}

		.table-custom {
			width: 100%;
			border-collapse: collapse;
		}

		.table-custom th {
			background: #fdfcf9;
			padding: 16px 20px;
			font-size: 11px;
			font-weight: 700;
			text-transform: uppercase;
			color: var(--text-secondary);
			border-bottom: 1px solid var(--border);
			text-align: left;
		}

		.table-custom td {
			padding: 16px 20px;
			font-size: 14px;
			border-bottom: 1px solid var(--border);
		}

		.badge-present {
			background: #eaf3de;
			color: #2d7a4f;
			padding: 4px 12px;
			border-radius: 30px;
			font-size: 10px;
			font-weight: 700;
		}

		@keyframes fadeInUp {
			from { opacity: 0; transform: translateY(20px); }
			to { opacity: 1; transform: translateY(0); }
		}
	</style>
</head>

<body>

	<div th:replace="fragments/sidebar :: sidebar"></div>

	<main class="main">
		<div th:replace="fragments/topbar :: topbar"></div>

		<div class="content">
			
			<div class="page-header">
				<div class="header-title">
					<h2>My Presence</h2>
					<p th:text="${currentUser.name + ' · Attendance Records'}">Student Name · Records</p>
				</div>
			</div>

			<div class="stats-grid">
				<div class="stat-pill">
					<div class="stat-label">Total Present</div>
					<div class="stat-value" th:text="${records.size()}">0</div>
				</div>
				<div class="stat-pill">
					<div class="stat-label">Overall %</div>
					<div class="stat-value">--</div>
				</div>
				<div class="stat-pill">
					<div class="stat-label">Last Mark</div>
					<div class="stat-value" style="font-size: 16px;" th:text="${!#lists.isEmpty(records) ? records[0].date : 'N/A'}">--</div>
				</div>
			</div>

			<div class="glass-card">
				<div class="table-wrap">
					<table class="table-custom">
						<thead>
							<tr>
								<th>Course Name</th>
								<th>Date</th>
								<th>Time</th>
								<th>Method</th>
								<th>Status</th>
							</tr>
						</thead>
						<tbody>
							<tr th:each="r : ${records}">
								<td style="font-weight:600;" th:text="${r.className}">Course Name</td>
								<td th:text="${#dates.format(r.date, 'dd MMM yyyy')}">Date</td>
								<td th:text="${r.time}">Time</td>
								<td th:text="${r.method}">Method</td>
								<td><span class="badge-present">PRESENT</span></td>
							</tr>
							<tr th:if="${#lists.isEmpty(records)}">
								<td colspan="5" class="text-center py-5 text-muted">No attendance records found for you.</td>
							</tr>
						</tbody>
					</table>
				</div>
			</div>

		</div>
	</main>

</body>
</html>
